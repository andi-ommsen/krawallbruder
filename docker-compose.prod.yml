networks:
  krawallbruder-network:
    driver: bridge

volumes:
  db_data:

services:

  # ── Nginx: serviert Frontend (statisch) + proxied /api zu PHP ────────────
  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL}
    ports:
      - "127.0.0.1:8080:80"   # nur localhost – SSL läuft über Host-Nginx
    networks:
      - krawallbruder-network
    depends_on:
      - php
    restart: unless-stopped

  # ── PHP-FPM: Symfony Backend (Code direkt im Image) ──────────────────────
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    env_file: .env.prod
    networks:
      - krawallbruder-network
    depends_on:
      database:
        condition: service_healthy
    restart: unless-stopped

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-krawallbruder}
      POSTGRES_USER: ${POSTGRES_USER:-kb_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - krawallbruder-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kb_user} -d ${POSTGRES_DB:-krawallbruder}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
