name: Deploy to Webspace

on:
  push:
    branches: [master]
  workflow_dispatch:  # manuell ausführbar

jobs:
  # ─────────────────────────────────────────────────
  # 1) Frontend bauen & hochladen
  # ─────────────────────────────────────────────────
  deploy-frontend:
    name: Frontend Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js Setup
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Deploy frontend via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete --exclude='.htaccess'
          path: frontend/dist/
          remote_path: ${{ secrets.REMOTE_FRONTEND_PATH }}
          remote_host: ${{ secrets.SSH_HOST }}
          remote_port: ${{ secrets.SSH_PORT }}
          remote_user: ${{ secrets.SSH_USER }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}

  # ─────────────────────────────────────────────────
  # 2) Backend hochladen & Migrationen ausführen
  # ─────────────────────────────────────────────────
  deploy-backend:
    name: Backend Deploy & Migrate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy backend via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: >-
            -avz
            --exclude='vendor/'
            --exclude='var/'
            --exclude='.env.local'
            --exclude='.env.local.php'
            --exclude='.env.*.local'
            --exclude='config/secrets/prod/'
          path: backend/
          remote_path: ${{ secrets.REMOTE_BACKEND_PATH }}
          remote_host: ${{ secrets.SSH_HOST }}
          remote_port: ${{ secrets.SSH_PORT }}
          remote_user: ${{ secrets.SSH_USER }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Post-deploy: composer install & migrate
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ${{ secrets.REMOTE_BACKEND_PATH }}

            # Composer install (ohne dev-Pakete)
            composer install --no-dev --optimize-autoloader --no-interaction

            # Datenbankmigrationen
            php bin/console doctrine:migrations:migrate --no-interaction --env=prod

            # Cache leeren
            php bin/console cache:clear --env=prod

            # Dateiberechtigungen setzen
            chmod -R 775 var/
